           height="12mm"
           style="fill:none;stroke:#808080"
           id="rect2" /><text
           text-anchor="middle"
           x="74mm"
           y="16mm"
           class="title"
           id="text2">Щи из свежей капусты</text><g
           class="content"
           id="g21"><text
             x="16mm"
             y="32mm"
             id="text11"><tspan
               x="16mm"
               dy="0"
               id="tspan2">▪ ½ шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan3">▪ 4 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan4">▪ 2 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan5">▪ 1 головка</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan6">▪ 1 м. пучок</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan7">▪ 2 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan8">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan9">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan10">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan11">▪ 1 ½ л</tspan></text><text
             x="50mm"
             y="32mm"
             id="text21"><tspan
               x="50mm"
               dy="0em"
               id="tspan12">Белокочаная капуста</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan13">Картофель</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan14">Морковь</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan15">Лук репчатый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan16">Петрушка</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan17">Масло растительное</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan18">Перец молотый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan19">Перец молотый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan20">Соль</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan21">Овощной или мясной бульон</tspan></text></g><text
           text-anchor="middle"
           x="74mm"
           y="104mm"
           class="title"
           id="text22">—</text><g
           class="content"
           id="g22" /><text
           x="8mm"
           y="112mm"
           class="preparing__content"
           id="text37"><tspan
             x="8mm"
             dy="0"
             class="bold"
             id="tspan22">1.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan23">Капусту шинкуем соломкой. Картофель чистим, режим</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan24">кубиками.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan25">2.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan26">Кипятим бульон, отвариваем в нём картофель, через</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan27">несколько минут добавляем капусту.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan28">3.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan29">Лук чистим и мелко режем. Морковь чистим и трём</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan30">на крупной терке. Петрушку мелко рубим.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan31">4.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan32">На растительном масле поджариваем лук</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan33">до золотистого цвета, добавляем морковь. Вводим</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan34">зажарку в бульон.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan35">5.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan36">Солим, перчим, варим до готовности овощей,</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan37">в конце добавляем петкушку.</tspan></text></g><g
         id="g53"
         transform="translate(562.50144,-0.57393221)"><rect
           x="0mm"
           y="0mm"
           width="148mm"
           height="210mm"
           class="recipe__container"
           id="rect1-4" /><rect
           x="0mm"
           y="8mm"
           width="148mm"
           height="12mm"
           style="fill:none;stroke:#808080"
           id="rect2-9" /><text
           text-anchor="middle"
           x="74mm"
           y="16mm"
           class="title"
           id="text2-5">Борщ от Высоцкой</text><g
           class="content"
           id="g29"><text
             x="16mm"
             y="32mm"
             id="text15"><tspan
               x="16mm"
               dy="0"
               id="tspan2-0">▪ 1.5 л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan3-4">▪ 0.5 кочан</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan4-8">▪ 3 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan5-7">▪ 1 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan6-1">▪ 1 крупная</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan7-7">▪ 1 крупная</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan8-2">▪ 1 головка</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan9-7">▪ 2-3 шт</tspan><tspan
               x="16mm"
               dy="0.80000001em"
               id="tspan10-2">▪ 1.5 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan11-2">▪ 100 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan12-6">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan13-1">▪ 1 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan14-0">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan15-6">▪ по вкусу</tspan></text><text
             x="50mm"
             y="32mm"
             id="text29"><tspan
               x="50mm"
               dy="0em"
               id="tspan16-1">Овощной или мясной бульон</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan17-5">Белокочаная капуста</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan18-9">Картофель</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan19-4">Перец болгарский красный</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan20-9">Морковь</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan21-0">Свёкла</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan22-9">Лук репчатый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan23-1">Помидоры</tspan><tspan
               x="50mm"
               dy="0.80000001em"
               id="tspan24-7">или томатная паста</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan25-7">Оливковое масло</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan26-1">Петрушка/укроп</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan27-1">Лимонный сок</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan28-5">Сметана</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan29-9">Морская соль/перец</tspan></text></g><text
           text-anchor="middle"
           x="74mm"
           y="127mm"
           class="title"
           id="text30">—</text><g
           class="content"
           id="g30" /><text
           x="8mm"
           y="135mm"
           class="preparing__content"
           id="text53"><tspan
             x="8mm"
             dy="0"
             class="bold"
             id="tspan30-7">1.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan31-7">Вымытый и очищенный картофель и перец режем</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan32-6">кубиками, а капусту - соломкой.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan33-7">2.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan34-3">Опускаем овощи в кипящий бульон.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan35-6">3.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan36-5">Морковь натираем на крупной терке, лук мелко</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan37-6">режем.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan38">4.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan39">Свёклу натираем на крупной терке.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan40">5.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan41">Разогреваем на сковороде масло, обжариваем на нём</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan42">лук, добавляем морковь.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan43">6.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan44">Через некоторое время добавляем свёклу. Тушим.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan45">7.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan46">Добавляем протертые помидоры или томатную пасту</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan47">и лимонный сок. Тушим 20-25 мин до готовности.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan48">8.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan49">Готовую заправку выкладываем в кастрюлю</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan50">с бульоном, солим, перчим, добавляем зелень.</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan51">Доводим до кипения и снимаем с огня.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan52">9.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan53">Даём настояться. Подаём со сметаной и зеленью.</tspan></text></g></g></g></svg>
