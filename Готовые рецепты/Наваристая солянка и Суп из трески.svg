         class="title"
         id="text2">Наваристая солянка</text><g
         class="content"
         id="g31"><text
           x="16mm"
           y="32mm"
           id="text16"><tspan
             x="16mm"
             dy="0"
             id="tspan2">▪ 1 л</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan3">▪ 250 г</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan4">▪ 150 г</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan5">▪ 1.5 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan6">▪ 70 г</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan7">▪ 5 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan8">▪ 50 мл</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan9">▪ 1 ст.л</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan10">▪ 30 г</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan11">▪ 0.5 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan12">▪ 0.5 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan13">▪ 3 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan14">▪ 1 шт</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan15">▪ 30 мл</tspan><tspan
             x="16mm"
             dy="1.6em"
             id="tspan16">▪ по вкусу</tspan></text><text
           x="50mm"
           y="32mm"
           id="text31"><tspan
             x="50mm"
             dy="0em"
             id="tspan17">Мясной бульон</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan18">Говядина</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan19">Колбаса варёная</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan20">Лук репчатый</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan21">Оливки</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan22">Огурцы соленые</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan23">Огуречный рассол</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan24">Томатная паста</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan25">Каперсы</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan26">Лимонный сок</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan27">Лимон</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan28">Душистый перец</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan29">Лавровый лист</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan30">Масло растительное</tspan><tspan
             x="50mm"
             dy="1.6em"
             id="tspan31">Укроп</tspan></text></g><text
         text-anchor="middle"
         x="74mm"
         y="137mm"
         class="title"
         id="text32">—</text><g
         class="content"
         id="g32" /><text
         x="8mm"
         y="145mm"
         class="preparing__content"
         id="text55"><tspan
           x="8mm"
           dy="0"
           class="bold"
           id="tspan32">1.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan33">Луковицу (1.5шт) нарезаем четвертинками, жарим</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan34">до золотистого цвета. Добавляем томатную пасту</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan35">томим на среднем огне несколько минут.</tspan><tspan
           x="8mm"
           dy="1.5em"
           class="bold"
           id="tspan36">2.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan37">Режем огурцы (5шт) соломкой, добавляем к луку,</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan38">слегка обжариваем.</tspan><tspan
           x="8mm"
           dy="1.5em"
           class="bold"
           id="tspan39">3.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan40">Вливаем половник бульона, тушим на небольшом огне</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan41">15-20 минут до размягчения огурцов.</tspan><tspan
           x="8mm"
           dy="1.5em"
           class="bold"
           id="tspan42">4.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan43">Шинкуем говядину 250г, колбасу 150г тонкими</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan44">брусочками, закладываем в бульон, доводим</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan45">до кипения, варим 5-7 минут.</tspan><tspan
           x="8mm"
           dy="1.5em"
           class="bold"
           id="tspan46">5.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan47">Нарезаем оливки, добавляем их в суп вместе</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan48">с каперсами, лавровым листом, душистым перцем,</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan49">мелко-нарезанной зеленью.</tspan><tspan
           x="8mm"
           dy="1.5em"
           class="bold"
           id="tspan50">6.</tspan><tspan
           x="16.32mm"
           dy="0"
           id="tspan51">Доводим до кипения, провариваем 1-2 минуты, солим</tspan><tspan
           x="16mm"
           dy="0.80000001em"
           id="tspan52">и перчим.</tspan><tspan
           x="8mm"
           class="bold"
           id="tspan53"
           dy="1.5em">7.</tspan><tspan
           x="16.32mm"
           id="tspan54"
           dy="0">Настаиваем 5-7 минут. Подаём со сметаной,</tspan><tspan
           x="16mm"
           id="tspan55"
           dy="0.80000001em">ломтиками лимона, веточкой зелени.</tspan></text><g
         id="g47"
         transform="translate(561.23033,-0.14134954)"><rect
           x="0mm"
           y="0mm"
           width="148mm"
           height="210mm"
           class="recipe__container"
           id="rect1-5" /><rect
           x="0mm"
           y="8mm"
           width="148mm"
           height="12mm"
           style="fill:none;stroke:#808080"
           id="rect2-3" /><text
           text-anchor="middle"
           x="74mm"
           y="16mm"
           class="title"
           style="font-size:16px"
           id="text2-5">Овощной суп с треской</text><g
           class="content"
           id="g21"><text
             x="16mm"
             y="32mm"
             id="text11"><tspan
               x="16mm"
               dy="0"
               id="tspan2-6">▪ 500 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan3-2">▪ 450 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan4-9">▪ 100 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan5-1">▪ 1 головка</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan6-2">▪ 1 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan7-7">▪ 3 зубчика</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan8-0">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan9-9">▪ 2 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan10-3">▪ 1 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan11-6">▪ 300 г</tspan></text><text
             x="50mm"
             y="32mm"
             id="text21"><tspan
               x="50mm"
               dy="0em"
               id="tspan12-0">Треска</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan13-6">Помидоры</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan14-2">Морковь</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan15-6">Лук репчатый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan16-1">Кабачок</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan17-8">Чеснок</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan18-7">Морская соль/перец</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan19-9">Лавровый лист</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan20-2">Масло растительное</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan21-0">Вода</tspan></text></g><text
           text-anchor="middle"
           x="74mm"
           y="104mm"
           class="title"
           style="font-size:16px"
           id="text22">—</text><g
           class="content"
           id="g22" /><text
           x="8mm"
           y="112mm"
           class="preparing__content"
           id="text47"><tspan
             x="8mm"
             dy="0"
             class="bold"
             id="tspan22-2">1.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan23-3">Луковицу нарезаем кусочками, морковь трём</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan24-7">на тёрке.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan25-5">2.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan26-9">Помидоры 450г обдаем кипятком, снимаем кожицу,</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan27-2">сохраняем сок.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan28-2">3.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan29-8">Небольшой кабачок нарезаем кусочками, 3 зубчика</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan30-9">чеснока мелко рубим.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan31-7">4.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan32-3">Филе трески 500г моем, сушим, нарезаем</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan33-6">на кусочки, вынимаем косточки.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan34-1">5.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan35-2">Жарим лук, добавляем морковь, жарим до мягкости.</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan36-9">Добавляем нарезанные помидоры и сок. Готовим</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan37-3">5 мин.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan38-1">6.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan39-9">Добавляем кабачок и порубленный чеснок. Готовим</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan40-4">ещё 10 минут, помешивая.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan41-7">7.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan42-8">Солим, перчим, томим 1 минуту. Добавляем 300г</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan43-4">воды, доводим до кипения. Кладём филе трески.</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan44-5">Варим 10 минут под крышкой.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan45-0">8.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan46-3">За пару минут до готовности добавляем лавровый</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan47-6">лист. Даём настояться 10 минут.</tspan></text></g></g></g></svg>
