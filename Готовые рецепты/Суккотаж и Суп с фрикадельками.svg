           height="12mm"
           style="fill:none;stroke:#808080"
           id="rect2" /><text
           text-anchor="middle"
           x="74mm"
           y="16mm"
           class="title"
           id="text2">Суккоташ</text><g
           class="content"
           id="g23"><text
             x="16mm"
             y="32mm"
             id="text12"><tspan
               x="16mm"
               dy="0"
               id="tspan2">▪ 2 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan3">▪ 4 зубчика</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan4">▪ 400 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan5">▪ 1 банка</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan6">▪ 1 л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan7">▪ 50 мл</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan8">▪ 2 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan9">▪ 2 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan10">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan11">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan12">▪ 1 головка</tspan></text><text
             x="50mm"
             y="32mm"
             id="text23"><tspan
               x="50mm"
               dy="0em"
               id="tspan13">Перец болгарский красный</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan14">Чеснок</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan15">Фасоль белая</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan16">Кукуруза консервированная</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan17">Куриный бульон</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan18">Сливки</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan19">Сливочное масло</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan20">Петрушка</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan21">Соль</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan22">Перец молотый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan23">Лук репчатый</tspan></text></g><text
           text-anchor="middle"
           x="74mm"
           y="110mm"
           class="title"
           id="text24">—</text><g
           class="content"
           id="g24" /><text
           x="8mm"
           y="118mm"
           class="preparing__content"
           id="text46"><tspan
             x="8mm"
             dy="0"
             class="bold"
             id="tspan24">1.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan25">Лук очищаем и немелко нарезаем, обжариваем</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan26">на сливочном масле около 2 минут.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan27">2.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan28">Моем, чистим болгарский перец и нарезаем</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan29">полосочками. Добавляем к луку и жарим ещё</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan30">7 минут.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan31">3.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan32">Очищаем чеснок, измельчаем и добавляем к овощам.</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan33">Перемешиваем и даём обжариться ещё минуту.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan34">4.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan35">Добавляем вареную фасоль, кукурузу.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan36">5.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan37">Заливаем горячим бульоном и от момента закипания</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan38">варим 10 минут на слабом огне. Солим и перчим</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan39">по вкусу.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan40">6.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan41">В конце добавляем сливки и прогреваем.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan42">7.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan43">Добавляем зелень и снимаем с огня.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan44">8.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan45">Даём супу настояться 15-20 минут (можно</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan46">и дольше). Подаём с сухариками-крутонами.</tspan></text></g><g
         id="g36"
         transform="translate(562.18533,-0.57393221)"><rect
           x="0mm"
           y="0mm"
           width="148mm"
           height="210mm"
           class="recipe__container"
           id="rect1-2" /><rect
           x="0mm"
           y="8mm"
           width="148mm"
           height="12mm"
           style="fill:none;stroke:#808080"
           id="rect2-0" /><text
           text-anchor="middle"
           x="74mm"
           y="16mm"
           class="title"
           id="text2-6">Суп с фрикадельками</text><g
           class="content"
           id="g21"><text
             x="16mm"
             y="32mm"
             id="text11"><tspan
               x="16mm"
               dy="0"
               id="tspan2-1">▪ 800 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan3-5">▪ 1 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan4-5">▪ 1 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan5-4">▪ 1 ст.л</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan6-7">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan7-6">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan8-5">▪ по вкусу</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan9-6">▪ 400 г</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan10-9">▪ 2 шт</tspan><tspan
               x="16mm"
               dy="1.6em"
               id="tspan11-3">▪ по вкусу</tspan></text><text
             x="50mm"
             y="32mm"
             id="text21"><tspan
               x="50mm"
               dy="0em"
               id="tspan12-7">Филе индейки</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan13-4">Морковь</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan14-5">Яйцо</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan15-2">Масло растительное</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan16-5">Соль</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan17-4">Макароны</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan18-7">Перец молотый</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan19-4">Фарш</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan20-4">Картофель</tspan><tspan
               x="50mm"
               dy="1.6em"
               id="tspan21-3">Лавровый лист</tspan></text></g><text
           text-anchor="middle"
           x="74mm"
           y="104mm"
           class="title"
           id="text22">—</text><g
           class="content"
           id="g22" /><text
           x="8mm"
           y="112mm"
           class="preparing__content"
           id="text36"><tspan
             x="8mm"
             dy="0"
             class="bold"
             id="tspan22-0">1.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan23-7">Варим бульон из индейки.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan24-8">2.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan25-6">Добавляем в фарш мелко порезанную луковицу, яйцо,</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan26-8">соль, перец. Вымешиваем, лепим фрикадельки,</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan27-8">бросаем в кипящий бульон.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan28-4">3.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan29-3">Через пару минут добавляем порезанный кубиками</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan30-1">картофель и макароны.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan31-4">4.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan32-9">Обжариваем на растительном масле мелко нарезанный</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan33-2">лук и натёртую морковь. Вводим в бульон.</tspan><tspan
             x="8mm"
             dy="1.5em"
             class="bold"
             id="tspan34-0">5.</tspan><tspan
             x="16.32mm"
             dy="0"
             id="tspan35-6">Добавляем соль, лавровый лист. Варим ещё 5 минут</tspan><tspan
             x="16mm"
             dy="0.80000001em"
             id="tspan36-8">на маленьком огне.</tspan></text></g></g></g></svg>
